<noscript>
  <main style="max-width: 720px; margin: 40px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; line-height: 1.7; color: #1d1d1f;">
    <h1>Hutch</h1>
    <p><strong>メニューバーに置く、リマインダー専用の小さな棚。</strong></p>
    <p>Hutch は macOS のメニューバーに常駐する、AI 搭載のリマインダーアプリです。Apple 純正リマインダーを EventKit 経由で直接読み書きするため、書いたタスクは iCloud で iPhone / iPad / Mac の純正アプリにそのまま同期されます。</p>

    <h2>主な機能</h2>
    <ul>
      <li>メニューバー常駐 / Dock 非表示。Fn ダブルタップやグローバルショートカットで瞬時に開閉</li>
      <li>AI モードによる自然言語追加（「明日 15 時に歯医者」で日付・メモ・URL を自動抽出）</li>
      <li>3 状態ステータス（未着手 / 進行中 / 完了）</li>
      <li>サブタスクの追加と階層表示（Shortcuts.app と SQLite 連携）</li>
      <li>AI によるサブタスク自動分解（親タスクを 3〜7 件のサブタスクに展開）</li>
      <li>カレンダービュー（月グリッドにドット表示・日本祝日対応）</li>
      <li>マルチプロバイダー AI（Claude Code / Anthropic / OpenAI / Gemini）</li>
      <li>iCloud 共有リスト対応</li>
    </ul>

    <h2>インストール</h2>
    <p>Hutch は現在、未署名・未公証のオープンソース版として配布しています。安全性を重視する場合は、ソースコードを確認した上でローカルビルドしてください。</p>
    <pre><code>git clone https://github.com/Riku4230/Hutch.git
cd Hutch
./scripts/build_app.sh --install</code></pre>
    <p>要件: macOS 14+ / Swift 5.9+ / Xcode Command Line Tools</p>
    <p>Homebrew Cask と <a href="https://github.com/Riku4230/Hutch/releases/latest">GitHub Releases</a> の .dmg も提供していますが、現在は未署名のため上級者向けです。</p>

    <h2>セキュリティ</h2>
    <ul>
      <li>API キーは macOS Keychain にのみ保存。平文ファイルやサーバーには出ません</li>
      <li>AI リクエストは選択したプロバイダーへ直接 HTTPS 送信。中継サーバーなし</li>
      <li>純正リマインダーの SQLite アクセスは read-only スナップショット経由</li>
      <li>外部依存ライブラリゼロ</li>
    </ul>
